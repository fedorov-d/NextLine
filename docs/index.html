<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NextLine Transit</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7f4;
      --panel: #ffffff;
      --text: #162018;
      --muted: #5c6a5e;
      --accent: #1d6b3d;
      --border: #d9e2d8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eef5ef 0%, var(--bg) 100%);
      color: var(--text);
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 72px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 18px 45px rgba(18, 35, 21, 0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 2.2rem;
      line-height: 1.1;
    }
    p {
      margin: 0 0 16px;
      line-height: 1.65;
      color: var(--muted);
    }
    .links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }
    a.button {
      display: inline-block;
      padding: 12px 16px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid var(--border);
      color: var(--text);
      background: #f8fbf8;
    }
    a.button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>NextLine Transit</h1>
      <p>NextLine Transit helps users browse transit stops, routes, and live arrival information.</p>
      <p>This site hosts the public support and privacy pages used for App Store submission and customer support.</p>

      <div class="links">
        <a class="button primary" href="./support/">Support</a>
        <a class="button" href="./privacy/">Privacy Policy</a>
      </div>
    </section>
  </main>
</body>
</html>
